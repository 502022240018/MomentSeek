services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: ${COMPOSE_PROJECT_NAME:-momentseek-mvp}-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - ${HOST_RUNTIME_DIR:-./runtime}/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - momentseek

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: ${COMPOSE_PROJECT_NAME:-momentseek-mvp}-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ${HOST_RUNTIME_DIR:-./runtime}/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - momentseek

  milvus:
    image: milvusdb/milvus:v2.6.20
    container_name: ${COMPOSE_PROJECT_NAME:-momentseek-mvp}-milvus
    depends_on:
      - etcd
      - minio
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - ${HOST_RUNTIME_DIR:-./runtime}/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "${MILVUS_GRPC_PORT:-19530}:19530"
      - "${MILVUS_HEALTH_PORT:-9091}:9091"
    cpus: "${MILVUS_CPUS:-4}"
    mem_limit: "${MILVUS_MEMORY_LIMIT:-4g}"
    networks:
      - momentseek

networks:
  momentseek:
    # Network is created by compose.yml (app stack); if this file is started
    # first, Docker Compose will create it here and compose.yml will reuse it.
    # Using an explicit name keeps both stacks on the same network regardless
    # of which is started first.
    name: ${MOMENTSEEK_NETWORK_NAME:-momentseek-mvp-net}
