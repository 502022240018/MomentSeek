name: ${COMPOSE_PROJECT_NAME:-momentseek-mvp}
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    image: momentseek-mvp:cpu
    container_name: ${COMPOSE_PROJECT_NAME:-momentseek-mvp}-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      APP_DATA_DIR: /app/runtime
      APP_MODEL_DIR: /app/models
      NPU_ENABLED: "false"
    volumes:
      - "${HOST_RUNTIME_DIR:-./runtime}:/app/runtime"
      - "${HOST_MODEL_DIR:-./models}:/app/models"
    cpus: 24
    mem_limit: 48g
    pids_limit: 4096
    shm_size: 4gb
    stop_grace_period: 30s
    networks:
      - momentseek

networks:
  momentseek:
    name: ${MOMENTSEEK_NETWORK_NAME:-momentseek-mvp-net}
