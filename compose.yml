name: momentseek-mvp
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.cpu
      args:
        PIP_INDEX_URL: "${PIP_INDEX_URL:-}"
        PIP_EXTRA_INDEX_URL: "${PIP_EXTRA_INDEX_URL:-}"
    image: momentseek-mvp:cpu
    container_name: momentseek-mvp-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      APP_DATA_DIR: /app/runtime
      APP_MODEL_DIR: /app/models
      NPU_ENABLED: "false"
    volumes:
      - "${HOST_RUNTIME_DIR:-./runtime}:/app/runtime"
      - "${HOST_MODEL_DIR:-./models}:/app/models"
    cpus: "${APP_CPUS:-16}"
    mem_limit: "${APP_MEMORY_LIMIT:-16g}"
    pids_limit: 4096
    shm_size: 4gb
    stop_grace_period: 30s
    networks:
      - momentseek

networks:
  momentseek:
    name: momentseek-mvp-net
