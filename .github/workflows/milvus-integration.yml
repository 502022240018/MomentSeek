name: Milvus integration

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"
  pull_request:
    paths:
      - ".github/workflows/milvus-integration.yml"
      - "backend/app/indexing/batch_buffer.py"
      - "backend/app/indexing/milvus_*.py"
      - "backend/app/search.py"
      - "backend/app/settings.py"
      - "backend/requirements-ci.txt"
      - "backend/tests/test_milvus_connection.py"
      - "compose.milvus.yml"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/milvus-integration.yml"
      - "backend/app/indexing/batch_buffer.py"
      - "backend/app/indexing/milvus_*.py"
      - "backend/app/search.py"
      - "backend/app/settings.py"
      - "backend/requirements-ci.txt"
      - "backend/tests/test_milvus_connection.py"
      - "compose.milvus.yml"

permissions:
  contents: read

concurrency:
  group: milvus-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-milvus:
    name: Live Milvus tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      COMPOSE_PROJECT_NAME: momentseek-ci-${{ github.run_id }}
      HOST_RUNTIME_DIR: ${{ github.workspace }}/.ci-runtime/milvus
      MILVUS_ENABLED: "true"
      MILVUS_HOST: 127.0.0.1
      MILVUS_PORT: "19530"
      MILVUS_GRPC_PORT: "19530"
      MILVUS_HEALTH_PORT: "9091"
      MILVUS_READ_ENABLED: "true"
      MILVUS_WRITE_ENABLED: "true"
      MILVUS_FALLBACK_ENABLED: "false"
      MINIO_CONSOLE_PORT: "9001"
      MOMENTSEEK_NETWORK_NAME: momentseek-ci-${{ github.run_id }}
      RUN_MILVUS_INTEGRATION_TESTS: "1"
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements-ci.txt
            backend/requirements-dev.txt

      - name: Install CI dependencies
        run: python -m pip install -r backend/requirements-ci.txt

      - name: Start isolated Milvus
        run: |
          mkdir -p "$HOST_RUNTIME_DIR"
          docker compose -f compose.milvus.yml up -d

      - name: Wait for Milvus
        run: |
          for _ in $(seq 1 90); do
            if curl --fail --silent --show-error \
              "http://127.0.0.1:${MILVUS_HEALTH_PORT}/healthz"; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f compose.milvus.yml ps
          docker compose -f compose.milvus.yml logs milvus
          exit 1

      - name: Run live Milvus tests
        run: >-
          python -m pytest backend/tests/test_milvus_connection.py
          -m integration -q

      - name: Show Milvus logs after failure
        if: failure()
        run: docker compose -f compose.milvus.yml logs --no-color

      - name: Stop isolated Milvus
        if: always()
        run: docker compose -f compose.milvus.yml down --volumes --remove-orphans
