name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MILVUS_ENABLED: "false"
      MILVUS_HOST: 127.0.0.1
      MILVUS_PORT: "1"
      RUN_MILVUS_INTEGRATION_TESTS: "0"
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements-ci.txt
            backend/requirements-dev.txt

      - name: Install CI dependencies
        run: python -m pip install -r backend/requirements-ci.txt

      - name: Lint backend application
        run: python -m ruff check backend/app

      - name: Run offline backend tests
        run: python -m pytest backend/tests -m "not integration" -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
