services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.ascend
      args:
        ASCEND_RUNTIME_IMAGE: "${ASCEND_RUNTIME_IMAGE:-0a8e7788f0d1}"
    image: momentseek-mvp:ascend
    environment:
      NPU_ENABLED: "true"
    devices:
      - "/dev/davinci${HOST_NPU_DEVICE_ID:?set HOST_NPU_DEVICE_ID to an approved host NPU id}:/dev/davinci${HOST_NPU_DEVICE_ID:?set HOST_NPU_DEVICE_ID to an approved host NPU id}"
      - "/dev/davinci_manager:/dev/davinci_manager"
      - "/dev/devmm_svm:/dev/devmm_svm"
      - "/dev/hisi_hdc:/dev/hisi_hdc"
    volumes:
      - /usr/local/Ascend/driver:/usr/local/Ascend/driver:ro
