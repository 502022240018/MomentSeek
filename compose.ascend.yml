services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.ascend
      args:
        ASCEND_RUNTIME_IMAGE: "${ASCEND_RUNTIME_IMAGE:-swr.cn-south-1.myhuaweicloud.com/ascendhub/mindie:3.0.0b2-800I-A2-py311-openeuler24.03-lts}"
    image: momentseek-mvp:ascend
    environment:
      NPU_ENABLED: "true"
      OPENBLAS_NUM_THREADS: "${OPENBLAS_NUM_THREADS:-8}"
      OPENBLAS_DEFAULT_NUM_THREADS: "${OPENBLAS_DEFAULT_NUM_THREADS:-8}"
      OMP_NUM_THREADS: "${OMP_NUM_THREADS:-8}"
      MKL_NUM_THREADS: "${MKL_NUM_THREADS:-8}"
      NUMEXPR_NUM_THREADS: "${NUMEXPR_NUM_THREADS:-8}"
      BLIS_NUM_THREADS: "${BLIS_NUM_THREADS:-8}"
      TOKENIZERS_PARALLELISM: "${TOKENIZERS_PARALLELISM:-false}"
      NPU_WORKER_MODE: "${NPU_WORKER_MODE:-isolated}"
      SPEAKER_DEVICE: "${SPEAKER_DEVICE:-npu}"
      SPEAKER_MODEL_REPO: "${SPEAKER_MODEL_REPO:-/app/models/3D-Speaker}"
      SPEAKER_MODEL_CACHE_DIR: "${SPEAKER_MODEL_CACHE_DIR:-/app/models/3dspeaker-cache}"
    devices:
      - "/dev/davinci${HOST_NPU_DEVICE_ID:?set HOST_NPU_DEVICE_ID to an approved host NPU id}:/dev/davinci${HOST_NPU_DEVICE_ID:?set HOST_NPU_DEVICE_ID to an approved host NPU id}"
      - "/dev/davinci_manager:/dev/davinci_manager"
      - "/dev/devmm_svm:/dev/devmm_svm"
      - "/dev/hisi_hdc:/dev/hisi_hdc"
    volumes:
      - /usr/local/Ascend/driver:/usr/local/Ascend/driver:ro
